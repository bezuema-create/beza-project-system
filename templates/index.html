<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የተማሪዎች ምዝገባ</title>
    <style>
        body { background: url("{{ url_for('static', filename='bg.jpg') }}") center/cover; padding: 20px; }
        .container { background: rgba(255,255,255,0.9); padding: 20px; border-radius: 10px; max-width: 800px; margin: auto; }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align:right;"><a href="/logout">Logout</a></div>
        <img src="{{ url_for('static', filename='logo.png') }}" style="width:100px;">
        <h2>ተማሪዎችን ይመዝግቡ</h2>
        <form action="/register" method="POST">
            <input type="text" name="name" placeholder="ሙሉ ስም" required>
            <input type="email" name="email" placeholder="ኢሜይል" required>
            <input type="text" name="course" placeholder="ኮርስ" required>
            <button type="submit">መዝግብ</button>
        </form>
        <h3>የተመዘገቡ ተማሪዎች ዝርዝር</h3>
        <table border="1" style="width:100%; border-collapse:collapse;">
            <tr><th>ስም</th><th>ኢሜይል</th><th>ኮርስ</th><th>ድርጊት</th></tr>
            {% for s in students %}
            <tr>
                <td>{{ s['name'] }}</td><td>{{ s['email'] }}</td><td>{{ s['course'] }}</td>
                <td><a href="/edit/{{ s['id'] }}">Edit</a> | <a href="/delete/{{ s['id'] }}" style="color:red;">Delete</a></td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
