{% extends 'base.html' %}
{% block content %}
<h2>List of Students</h2>
<form method="GET" class="mb-3">
    <input type="text" name="id_number" placeholder="Search by ID..." class="form-control d-inline w-25">
    <button type="submit" class="btn btn-primary">Search</button>
</form>

<table class="table table-striped">
    <thead><tr><th>Name</th><th>ID</th><th>Department</th><th>Actions</th></tr></thead>
    <tbody>
    {% for student in students %}
    <tr>
        <td>{{ student.full_name }}</td>
        <td>{{ student.id_number }}</td>
        <td>{{ student.department }}</td>
        <td>
            <a href="/edit/{{ student.id }}" class="btn btn-warning btn-sm">Edit</a>
            <a href="/delete/{{ student.id }}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
<a href="/" class="btn btn-secondary">Back to Dashboard</a>
{% endblock %}
